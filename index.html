<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Model Architecture Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-color: #050505; --card-bg: #121212; --accent: #3b82f6; }
        body { background-color: var(--bg-color); color: #e5e5e5; font-family: 'Inter', system-ui, sans-serif; }
        .nav-glass { background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .bento-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 24px; transition: all 0.3s ease; }
        .bento-card:hover { border-color: rgba(59,130,246,0.5); transform: translateY(-4px); }
        .text-gradient { background-image: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body class="pt-24 pb-12">

    <nav class="nav-glass fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div id="nav-brand" class="font-bold text-lg tracking-wide text-white"></div>
            <div class="flex items-center space-x-6">
                <div class="hidden md:flex space-x-6 text-sm text-gray-400" id="nav-links">
                    </div>
                <button id="lang-toggle" onclick="toggleLanguage()" class="px-4 py-2 bg-white/10 text-white text-sm font-bold rounded-full hover:bg-white/20 transition backdrop-blur-sm border border-white/10">
                    🌐 English
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-4">
        
        <div class="md:col-span-4 bento-card flex flex-col justify-center min-h-[400px] relative overflow-hidden bg-[url('https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=1200&auto=format')] bg-cover bg-center">
            <div class="absolute inset-0 bg-black/70"></div>
            <div class="relative z-10 text-center max-w-3xl mx-auto">
                <h1 id="hero-title" class="text-4xl md:text-5xl font-extrabold text-white mb-4"></h1>
                <p id="hero-subtitle" class="text-gray-300 mb-8"></p>
                <button id="hero-btn" class="px-6 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-full transition"></button>
            </div>
        </div>

        <div class="md:col-span-4 mt-8">
            <h2 id="section-architecture" class="text-2xl font-bold mb-4 px-2"></h2>
            <div id="research-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div class="md:col-span-4 mt-8">
            <h2 id="section-team" class="text-2xl font-bold mb-4 px-2"></h2>
            <div id="team-container" class="space-y-8"></div>
        </div>

        <div class="md:col-span-4 mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bento-card">
                <h2 id="section-pubs" class="text-xl font-bold mb-4"></h2>
                <div id="pubs-container" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>
            </div>
            <div class="bento-card bg-[#0a0a0a]">
                <h2 id="section-contact" class="text-xl font-bold mb-4"></h2>
                <div id="contact-container" class="text-sm text-gray-400 space-y-2"></div>
            </div>
        </div>

    </main>

    <footer id="footer-text" class="text-center text-gray-600 text-xs mt-12 py-6"></footer>

    <script src="data.js"></script>
    <script>
        let currentLang = 'zh'; // 默认语言

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            renderContent();
        }

        function renderContent() {
            const data = websiteData;
            const l = currentLang;

            // 1. 静态文本替换
            document.getElementById('nav-brand').innerText = data.nav.brand[l];
            document.getElementById('lang-toggle').innerText = data.nav.langBtn[l];
            document.getElementById('hero-title').innerText = data.hero.title[l];
            document.getElementById('hero-subtitle').innerText = data.hero.subtitle[l];
            document.getElementById('hero-btn').innerText = data.hero.btn[l];
            
            document.getElementById('section-architecture').innerText = data.sections.architecture[l];
            document.getElementById('section-team').innerText = data.sections.team[l];
            document.getElementById('section-pubs').innerText = data.sections.pubs[l];
            document.getElementById('section-contact').innerText = data.sections.contact[l];
            document.getElementById('footer-text').innerText = data.footer[l];

            // 2. 渲染研究领域 (去重并展示前4个核心模型)
            const uniqueResearch = data.researchData.slice(0, 4); 
            document.getElementById('research-container').innerHTML = uniqueResearch.map(item => `
                <div class="bento-card flex flex-col group cursor-default">
                    <span class="text-3xl mb-3">${item.icon}</span>
                    <h3 class="font-bold text-lg text-white mb-2 group-hover:text-blue-400 transition">${item.title[l]}</h3>
                    <p class="text-sm text-gray-400 leading-relaxed">${item.desc[l]}</p>
                </div>
            `).join('');

            // 3. 渲染团队成员
            document.getElementById('team-container').innerHTML = data.teamData.map(category => `
                <div>
                    <h3 class="text-lg font-mono text-blue-500 mb-4 px-2 border-l-2 border-blue-500 ml-2">${category.categoryTitle[l]}</h3>
                    <div class="grid grid-cols-2 md:grid-cols-${category.cardsPerRow === 1 ? '1' : '4'} gap-4">
                        ${category.members.map(member => `
                            <div class="bento-card flex items-center p-4 hover:bg-[#1a1a1a]">
                                <img src="${member.avatarImg}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(member.name.en)}&background=121212&color=fff'" class="w-12 h-12 rounded-full object-cover mr-4">
                                <div>
                                    <h4 class="font-bold text-gray-200">${member.name[l]}</h4>
                                    <p class="text-xs text-gray-500">${member.role[l]}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // 4. 渲染论文列表 (取前5篇)
            document.getElementById('pubs-container').innerHTML = data.pubData.slice(0, 5).map(pub => `
                <div class="border-b border-gray-800 pb-3 last:border-0">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs font-mono text-purple-400">${pub.year}</span>
                        <a href="${pub.pdfLink}" class="text-xs text-blue-500 hover:underline">PDF [${pub.pdfSize}]</a>
                    </div>
                    <h4 class="text-sm font-medium text-gray-200 hover:text-white transition cursor-pointer">${pub.title[l]}</h4>
                    <p class="text-xs text-gray-500 mt-1">${pub.authors[l]} - <i>${pub.journal[l]}</i></p>
                </div>
            `).join('');

            // 5. 渲染联系方式
            document.getElementById('contact-container').innerHTML = `
                <h3 class="font-bold text-white mb-2">${data.contactInfo.title[l]}</h3>
                <p class="mb-4">${data.contactInfo.desc[l]}</p>
                <div class="mb-2"><strong class="text-gray-300">${data.contactInfo.addressLabel[l]}:</strong><br> ${data.contactInfo.addressVal[l]}</div>
                <div><strong class="text-gray-300">${data.contactInfo.emailLabel[l]}:</strong> contact@example.com</div>
            `;
        }

        // 初始化渲染
        document.addEventListener('DOMContentLoaded', renderContent);
    </script>
</body>
</html>
