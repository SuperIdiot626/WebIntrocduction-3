<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多模型协作系统研究组 | Multi-Model Architecture Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 600: '#2563eb', 700: '#1d4ed8' },
                        neutral: { 950: '#111827' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #111827; }
        .content-card {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            transition: all 0.2s ease-in-out;
        }
        .content-card:hover {
            border-color: #d1d5db;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        /* 自定义滚动条，让右侧滚动更优雅 */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background-color: #d1d5db; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-brand-100">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <header class="flex justify-between items-center border-b border-gray-100 pb-4 mb-8">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-brand-600 rounded"></div>
                <h1 id="nav-brand" class="text-xl font-bold text-neutral-950 tracking-tight"></h1>
            </div>
            <button onclick="toggleLanguage()" class="text-gray-600 hover:text-brand-600 px-3 py-1.5 rounded-full hover:bg-brand-50 transition font-medium text-sm">
                <span id="lang-text" class="flex items-center gap-1.5"></span>
            </button>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <section class="bg-brand-600 text-white p-8 sm:p-12 rounded-2xl shadow-sm">
                    <h2 id="hero-title" class="text-3xl sm:text-4xl font-extrabold tracking-tighter leading-tight mb-4"></h2>
                    <p id="hero-subtitle" class="text-lg text-brand-100 max-w-3xl leading-relaxed mb-8"></p>
                    <button id="hero-btn" class="bg-white text-brand-700 font-semibold px-6 py-2.5 rounded-full hover:bg-brand-50 transition text-sm shadow-sm flex items-center gap-2"></button>
                </section>

                <section>
                    <h2 id="section-architecture" class="text-2xl font-bold tracking-tight text-neutral-950 mb-6"></h2>
                    <div id="research-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </section>

                <section>
                    <h2 id="section-team" class="text-2xl font-bold tracking-tight text-neutral-950 mb-6"></h2>
                    <div id="team-container" class="space-y-10"></div>
                </section>
            </div>

            <div class="space-y-8 relative">
                <section class="content-card p-6 flex flex-col transition-all duration-500 relative">
                    <h2 id="section-pubs" class="text-xl font-bold text-neutral-950 mb-6 pb-2 border-b border-gray-200"></h2>
                    <div id="pubs-container" class="flex-1 space-y-5 text-sm"></div>
                    <div id="pubs-action-container" class="mt-4 pt-4 border-t border-gray-100 hidden"></div>
                </section>

                <section class="content-card p-6 sticky top-6">
                    <h2 id="section-contact" class="text-xl font-bold text-neutral-950 mb-6 pb-2 border-b border-gray-200"></h2>
                    <div id="contact-container" class="text-sm space-y-4"></div>
                </section>
            </div>
        </main>

        <footer id="footer-text" class="text-center text-xs text-gray-500 mt-16 py-8 border-t border-gray-100"></footer>
    </div>

    <script src="data.js"></script>
    <script>
        let currentLang = 'zh';
        let isPubsExpanded = false; // 新增：控制论文列表是否展开的状态

        function toggleLanguage() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            renderContent();
        }

        function togglePubs() {
            isPubsExpanded = !isPubsExpanded;
            renderContent();
        }

        function renderContent() {
            const data = websiteData;
            const l = currentLang;

            document.getElementById('nav-brand').innerText = data.nav.brand[l];
            document.getElementById('lang-text').innerText = data.nav.langBtn[l];
            document.getElementById('hero-title').innerText = data.hero.title[l];
            document.getElementById('hero-subtitle').innerText = data.hero.subtitle[l];
            document.getElementById('hero-btn').innerText = data.hero.btn[l];
            document.getElementById('section-architecture').innerText = data.sections.architecture[l];
            document.getElementById('section-team').innerText = data.sections.team[l];
            document.getElementById('section-pubs').innerText = data.sections.pubs[l];
            document.getElementById('section-contact').innerText = data.sections.contact[l];
            document.getElementById('footer-text').innerText = data.footer[l];

            const uniqueResearch = data.researchData.slice(0, 4);
            document.getElementById('research-container').innerHTML = uniqueResearch.map(item => `
                <div class="content-card p-5 group flex items-start gap-4 hover:border-brand-100">
                    <div class="text-3xl bg-white p-2 rounded-lg border border-gray-100 shadow-sm">${item.icon}</div>
                    <div>
                        <h3 class="font-semibold text-neutral-950 mb-1.5 group-hover:text-brand-600 transition">${item.title[l]}</h3>
                        <p class="text-xs text-gray-600 leading-relaxed">${item.desc[l]}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('team-container').innerHTML = data.teamData.map((category) => {
                let catTitle = category.categoryTitle[l];
                // 强制将第三类修正为研究员
                if (category.categoryTitle.zh.includes("研究生") || category.categoryTitle.zh.includes("学生")) {
                    catTitle = l === 'zh' ? "研究员 (Researchers)" : "Researchers";
                }

                return `
                <div>
                    <h3 class="text-sm font-semibold text-gray-500 mb-6 uppercase tracking-wider flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-brand-600 rounded-full"></span>
                        ${catTitle}
                    </h3>
                    <div class="grid gap-4 ${category.cardsPerRow === 1 ? 'grid-cols-1' : 'grid-cols-1 md:grid-cols-2'}">
                        ${category.members.map(member => `
                            <div class="flex flex-col sm:flex-row gap-5 content-card p-5 hover:border-brand-100 relative items-center">
                                <img src="${member.avatarImg}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(member.name.en)}&background=f3f4f6&color=111827'" class="w-20 h-20 sm:w-24 sm:h-24 rounded-full object-cover flex-shrink-0 border border-gray-200 shadow-sm">
                                
                                <div class="flex-1 min-w-0 w-full">
                                    <div class="flex justify-between items-start mb-1">
                                        <h4 class="font-semibold text-neutral-950 text-base truncate pr-2">${member.name[l]}</h4>
                                        <div class="flex gap-2 text-gray-400">
                                            ${member.contact?.email ? `<a href="mailto:${member.contact.email}" class="hover:text-brand-600 transition" title="Email">✉️</a>` : ''}
                                            ${member.contact?.website && member.contact.website !== '#' ? `<a href="${member.contact.website}" target="_blank" class="hover:text-brand-600 transition" title="Website">🔗</a>` : ''}
                                            ${member.contact?.github && member.contact.github !== '#' ? `<a href="${member.contact.github}" target="_blank" class="hover:text-brand-600 transition" title="GitHub">💻</a>` : ''}
                                        </div>
                                    </div>
                                    <p class="text-xs text-brand-600 font-medium mb-1 truncate">${member.role[l]}</p>
                                    <p class="text-[11px] text-gray-500 mb-2 truncate" title="${member.department[l]}">${member.department[l]}</p>
                                    
                                    ${category.cardsPerRow === 1 ? 
                                        `<div class="text-sm text-gray-600 leading-relaxed mt-4">${member.desc[l]}</div>` 
                                        : 
                                        `<div class="text-xs text-gray-600 mt-3 mb-3 leading-relaxed">${member.desc[l] || '暂无详细介绍...'}</div>
                                         ${member.interests ? `<div class="flex flex-wrap gap-1 mt-auto">
                                            ${member.interests[l].slice(0, 3).map(tag => `<span class="px-1.5 py-0.5 bg-gray-100 text-gray-600 text-[10px] rounded border border-gray-200">${tag}</span>`).join('')}
                                         </div>` : ''}
                                        `
                                    }
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            }).join('');

            // 修改④：基于状态控制论文列表渲染数量
            const pubsToRender = isPubsExpanded ? data.pubData : data.pubData.slice(0, 6);
            document.getElementById('pubs-container').innerHTML = pubsToRender.map((pub, index) => `
                <div class="border-b border-gray-100 pb-5 last:border-0 last:pb-0 group flex gap-3.5 items-start">
                    <div class="flex-shrink-0 mt-0.5">
                        <span class="flex items-center justify-center w-6 h-6 rounded bg-brand-50 text-brand-600 text-xs font-bold border border-brand-100 shadow-sm">${index + 1}</span>
                    </div>
                    
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-3 text-xs text-gray-400 mb-1.5">
                            <span class="font-semibold text-brand-600">${pub.year}</span>
                            <span>|</span>
                            <span class="truncate">${pub.journal[l]}</span>
                        </div>
                        
                        <h4 class="font-medium text-neutral-950 leading-snug mb-1.5">${pub.title[l]}</h4>
                        <p class="text-xs text-gray-500 mb-3">${pub.authors[l]}</p>
                        
                        ${pub.pdfLink ? `
                        <a href="${pub.pdfLink}" target="_blank" rel="noopener noreferrer" download class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white border border-gray-200 text-gray-600 hover:text-brand-600 hover:border-brand-600 hover:bg-brand-50 text-xs font-medium rounded-md transition-all shadow-sm">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            PDF 下载 (${pub.pdfSize || '未知'})
                        </a>` : ''}
                    </div>
                </div>
            `).join('');

            // 渲染“查看更多”按钮
            const btnContainer = document.getElementById('pubs-action-container');
            btnContainer.classList.remove('hidden');
            btnContainer.innerHTML = `
                <a href="publications.html" class="flex items-center justify-center w-full py-2.5 bg-white border border-gray-200 hover:border-brand-600 hover:text-brand-600 text-gray-600 text-xs font-semibold rounded-lg transition-colors shadow-sm">
                    ${data.sections.morePubsBtn[l]}
                </a>
            `;

            document.getElementById('contact-container').innerHTML = `
                <p class="text-gray-600 leading-relaxed mb-5 pb-5 border-b border-gray-100">${data.contactInfo.desc[l]}</p>
                <div class="flex flex-col gap-3 font-medium text-gray-800">
                    <div class="flex items-start gap-2.5">
                        <span class="text-gray-400 mt-0.5 flex-shrink-0">📍</span>
                        <span class="text-gray-700">${data.contactInfo.addressVal[l]}</span>
                    </div>
                    <div class="flex items-center gap-2.5">
                        <span class="text-gray-400 flex-shrink-0">✉️</span>
                        <span class="text-brand-600 hover:underline">contact@example.com</span>
                    </div>
                </div>
            `;
        }

        document.addEventListener('DOMContentLoaded', renderContent);
    </script>
</body>
</html>
